Thomas Soehl:
  name: Thomas Soehl
  current_role:
    type: Faculty / Professor
    title: Assistant Professor
  bio: Thomas Soehl is an Assistant Professor in the Department of Sociology at McGill
    University. His work mainly examines the themes of international migration, race,
    and ethnicity. More specifically, he studies these themes through the lens of
    the family as a locus for the transmission of culture and political attachments.
    Recently, he has looked at the acquisition of citizenship in Canada and France,
    as well as at the determinants of anti-immigration attitudes. Professor Soehl's
    research makes use of quantitative research methods such as using event history
    analysis and multi-level modeling.
