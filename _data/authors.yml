Dietlind Stolle:
  name: Dietlind Stolle
  current_role:
    type: Faculty / Professor
  bio: Dietlind Stolle is a Professor of Political Science at McGill University. Her
    research looks at political mobilization, participation and knowledge, as well
    as social capital, ethnic and racial prejudice, and the consequences of ethnic
    diversity. She is also a Principal Investigator of the Canadian Election Study.
    Professor Stolle's projects include quantitative research looking into youth mobilization
    and participation on Facebook, the role of pregnancy on political behaviour, the
    impact of religious diversity in 11 different countries, and attitudes towards
    refugees in Germany. She is also the Director of the Centre for the Study of Democratic
    Citizenship.
  avatar: /assets/images/bio/Dietlind Stolle.jpg

