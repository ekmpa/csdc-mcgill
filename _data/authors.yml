Éric Bélanger:
  name: Éric Bélanger
  current_role:
    type: Faculty / Professor
    title: Professor
    affiliation: McGill University
  bio: Éric Bélanger is Professor of Political Science at McGill University. He is
    also a member of the Royal Society of Canada’s College of New Scholars, Artists
    and Scientists. Though centered around Quebec and Canadian politics, his research
    focuses on the general themes of political parties, public opinion, and voting
    behaviour using a variety of quantitative methods. Some of his prior research
    has been concerned with economic voting and Quebec provincial elections. He is
    also involved in research projects studying voting behaviour in Latin America,
    as well as a comparison of nationalism in Quebec and Scotland.
  orcid: 0000-0003-3289-6000
  auto_update_publications: true
