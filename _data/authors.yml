    affiliation: McGill University, J-PAL, IZA.
  bio: Nicolas Ajzenman is an Assistant Professor at McGill (Economics Department)
    and an affiliated professor at J-PAL and IZA. He is working at the intersection
    of development economics, behavioral economics, and political economy. His research
    has appeared or is forthcoming in top scientific journals such as the American
    Economic Journal.
