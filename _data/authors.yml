Aaron Erlich:
  name: Aaron Erlich
  current_role:
    type: Faculty
    title: Prof.
    affiliation: McGill University
  bio: Aaron Erlich is an Assistant Professor of Political Science at McGill University.
    His research interests concern questions of democratization, information dissemination,
    political behavior, political participation, and public opinion in the Former
    Soviet Union, Eastern and Southern Africa, and Mexico. Professor Erlich's research
    makes use of a variety of methods, such as field experiments, survey experiments,
    and mixed-method research designs.
