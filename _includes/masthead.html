<!-- Overrides and modified from: https://raw.githubusercontent.com/mmistakes/minimal-mistakes/master/_includes/masthead.html -->
{% assign current_path = page.url | default: '/' %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav csdc-shell-nav">
        <a class="site-title" href="{{ '/' | relative_url }}">
          McGill CSDC
          <span class="site-subtitle">Centre for the Study of Democratic Citizenship</span>
        </a>
        <ul class="visible-links">
          <li class="masthead__menu-item">
            <a class="csdc-nav-link{% if current_path == '/' or current_path == '/index.html' %} is-active{% endif %}" href="{{ '/' | relative_url }}">Home</a>
          </li>
          <li class="masthead__menu-item">
            <a class="csdc-nav-link{% if current_path == '/about/' or current_path contains '/about/' %} is-active{% endif %}" href="{{ '/about/' | relative_url }}">About</a>
          </li>
          <li class="masthead__menu-item">
            <a class="csdc-nav-link{% if current_path == '/people/' or current_path contains '/people/' %} is-active{% endif %}" href="{{ '/people/' | relative_url }}">Team</a>
          </li>
          <li class="masthead__menu-item">
            <a class="csdc-nav-link{% if current_path == '/publications/' or current_path contains '/publications/' or current_path == '/research/' or current_path contains '/research/' %} is-active{% endif %}" href="{{ '/publications/' | relative_url }}">Research</a>
          </li>
          <li class="masthead__menu-item">
            <a class="csdc-nav-link{% if current_path == '/news/' or current_path contains '/news/' %} is-active{% endif %}" href="{{ '/news/' | relative_url }}">News</a>
          </li>
          <li class="masthead__menu-item">
            <a class="csdc-nav-link{% if current_path == '/events/' or current_path contains '/events/' %} is-active{% endif %}" href="{{ '/events/' | relative_url }}">Events</a>
          </li>

        </ul>
        {% if site.search == true %}
        <button class="search__toggle" type="button">
          <span class="visually-hidden">{{ site.data.ui-text[site.locale].search_label | default: "Toggle search"
            }}</span>
          <i class="fas fa-search search-button"></i>
        </button>
        {% endif %}

        <button class="greedy-nav__toggle hidden" type="button">
          <span class="visually-hidden">{{ site.data.ui-text[site.locale].menu_label | default: "Toggle menu" }}</span>
          <div class="navicon"></div>
        </button>

        <ul class="hidden-links hidden"></ul>

      </nav>
    </div>
  </div>
</div>
