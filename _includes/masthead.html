<!-- Overrides and modified from: https://raw.githubusercontent.com/mmistakes/minimal-mistakes/master/_includes/masthead.html -->

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav csdc-shell-nav">
        <a class="site-title" href="{{ '/' | relative_url }}">
          <span class="site-title-text" data-i18n="site_title">McGill CSDC</span>
          <span class="site-subtitle" data-i18n="site_subtitle">Centre for the Study of Democratic Citizenship</span>
        </a>
        <ul class="visible-links">
          <li class="masthead__menu-item">
            <a class="csdc-nav-link" data-nav="home" href="{{ '/' | relative_url }}" data-i18n="nav_home">Home</a>
          </li>
          <li class="masthead__menu-item">
            <a class="csdc-nav-link" data-nav="about" href="{{ '/about/' | relative_url }}" data-i18n="nav_about">About</a>
          </li>
          <li class="masthead__menu-item">
            <a class="csdc-nav-link" data-nav="people" href="{{ '/people/' | relative_url }}" data-i18n="nav_people">Team</a>
          </li>
          <li class="masthead__menu-item">
            <a class="csdc-nav-link" data-nav="research" href="{{ '/publications/' | relative_url }}" data-i18n="nav_research">Research</a>
          </li>
          <li class="masthead__menu-item">
            <a class="csdc-nav-link" data-nav="news" href="{{ '/news/' | relative_url }}" data-i18n="nav_news">News</a>
          </li>
          <li class="masthead__menu-item">
            <a class="csdc-nav-link" data-nav="events" href="{{ '/events/' | relative_url }}" data-i18n="nav_events">Events</a>
          </li>

        </ul>
        {% if site.search == true %}
        <button class="search__toggle" type="button">
          <span class="visually-hidden">{{ site.data.ui-text[site.locale].search_label | default: "Toggle search"
            }}</span>
          <i class="fas fa-search search-button"></i>
        </button>
        {% endif %}

        <button class="csdc-lang-toggle" type="button" data-i18n="lang_button" data-i18n-aria="lang_toggle_label">FR</button>

        <button class="greedy-nav__toggle hidden" type="button">
          <span class="visually-hidden">{{ site.data.ui-text[site.locale].menu_label | default: "Toggle menu" }}</span>
          <div class="navicon"></div>
        </button>

        <ul class="hidden-links hidden"></ul>

      </nav>
    </div>
  </div>
</div>

<script>
(function () {
  var STORAGE_KEY = 'csdc-site-language';
  var translations = {
    en: {
      site_title: "McGill CSDC",
      site_subtitle: "Centre for the Study of Democratic Citizenship",
      nav_home: "Home",
      nav_about: "About",
      nav_people: "Team",
      nav_research: "Research",
      nav_news: "News",
      nav_events: "Events",
      lang_toggle_label: "Switch to French",
      lang_button: "FR"
    },
    fr: {
      site_title: "CSDC McGill",
      site_subtitle: "Centre pour l'étude de la citoyenneté démocratique",
      nav_home: "Accueil",
      nav_about: "À propos",
      nav_people: "Équipe",
      nav_research: "Recherche",
      nav_news: "Actualités",
      nav_events: "Événements",
      lang_toggle_label: "Passer à l'anglais",
      lang_button: "EN"
    }
  };

  function normalizeLanguage(value) {
    return value === 'fr' ? 'fr' : 'en';
  }

  function getPreferredLanguage() {
    var stored = localStorage.getItem(STORAGE_KEY);
    if (stored === 'fr' || stored === 'en') {
      return stored;
    }
    // Try to detect from browser language
    var browserLang = navigator.language || navigator.userLanguage;
    if (browserLang.startsWith('fr')) {
      return 'fr';
    }
    return 'en';
  }

  function getTranslation(key, lang) {
    lang = normalizeLanguage(lang);
    return (translations[lang] && translations[lang][key]) || key;
  }

  function applyTranslations(lang) {
    lang = normalizeLanguage(lang);
    localStorage.setItem(STORAGE_KEY, lang);

    // Update all elements with data-i18n attribute
    var elements = document.querySelectorAll('[data-i18n]');
    elements.forEach(function (element) {
      var key = element.getAttribute('data-i18n');
      var text = getTranslation(key, lang);
      element.textContent = text;
    });

    // Update all elements with data-i18n-aria attribute
    var ariaElements = document.querySelectorAll('[data-i18n-aria]');
    ariaElements.forEach(function (element) {
      var key = element.getAttribute('data-i18n-aria');
      var text = getTranslation(key, lang);
      element.setAttribute('aria-label', text);
    });

    // Update HTML lang attribute
    if (document.documentElement) {
      document.documentElement.lang = lang;
    }
  }

  function applyActiveNav() {
    var links = document.querySelectorAll('.csdc-shell-nav .csdc-nav-link');
    if (!links.length) {
      return;
    }

    links.forEach(function (link) {
      link.classList.remove('is-active');
    });

    var homeLink = document.querySelector('.csdc-shell-nav .csdc-nav-link[data-nav="home"]');
    var basePath = '';
    if (homeLink) {
      basePath = new URL(homeLink.href, window.location.origin).pathname.replace(/\/$/, '');
    }

    var currentPath = window.location.pathname;
    if (basePath && currentPath.indexOf(basePath) === 0) {
      currentPath = currentPath.slice(basePath.length);
    }

    if (!currentPath || currentPath === '') {
      currentPath = '/';
    }

    currentPath = currentPath.replace(/\/index\.html$/, '');
    if (!currentPath.startsWith('/')) {
      currentPath = '/' + currentPath;
    }

    var section = currentPath.split('/')[1] || 'home';
    if (section === 'publications' || section === 'research') {
      section = 'research';
    }

    var active = document.querySelector('.csdc-shell-nav .csdc-nav-link[data-nav="' + section + '"]');
    if (!active) {
      active = document.querySelector('.csdc-shell-nav .csdc-nav-link[data-nav="home"]');
    }

    if (active) {
      active.classList.add('is-active');
    }
  }

  document.addEventListener('DOMContentLoaded', function () {
    var currentLang = getPreferredLanguage();
    applyTranslations(currentLang);
    applyActiveNav();

    var toggle = document.querySelector('.csdc-lang-toggle');
    if (!toggle) {
      return;
    }

    toggle.addEventListener('click', function () {
      var nextLanguage = getPreferredLanguage() === 'fr' ? 'en' : 'fr';
      applyTranslations(nextLanguage);
    });
  });
})();
</script>
