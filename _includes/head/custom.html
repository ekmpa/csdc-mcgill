<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/site-icon.svg?v=20260412' | relative_url }}">
<link rel="shortcut icon" href="{{ '/assets/images/site-icon.svg?v=20260412' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/images/site-icon.svg?v=20260412' | relative_url }}">
<meta name="apple-mobile-web-app-title" content="McGill CSDC">
<meta name="application-name" content="McGill CSDC">
<meta name="theme-color" content="#1f2937">

<!-- SEO meta tags -->
<meta name="author" content="{% if page.names %}{{ page.names }}{% else %}{{ page.title }}{% endif %}">
<meta name="description"
    content="{% if page.abstract %}{{ page.abstract | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">

<!-- Open Graph and Twitter Card data -->
<meta property="og:type" content="{% if page.layout == 'publication' %}article{% else %}profile{% endif %}">
<meta property="og:locale" content="en_US">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:title" content="{{ page.title }}">
<meta property="og:description"
    content="{% if page.abstract %}{{ page.abstract | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
{% if page.openAccessPdf.url %}
<meta property="og:url" content="{{ page.openAccessPdf.url }}">{% endif %}


<!-- particles.js -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="/assets/js/particles-config.js"></script>
