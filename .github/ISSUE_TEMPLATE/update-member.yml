name: Update member profile 
description: |
  Update a Center member's profile.
title: "[Update member]"
labels: ["automatic-update-member"]
assignees:
  - octocat
body:
  - type: markdown
    attributes:
      value: |
        *Only* fill out the required fields and the fields that you want to modify. Leave everything else blank.
        
        When updating a profile, it will match the profile with the same full `name`. If multiple people have the same full name, it will match the first one encountered. In this case, you might want to to either make the change manually or move an older profile to the bottom (both require editing the YAML file).

        This form will automatically generate a PR that will be reviewed by the maintainers.
  
  - type: input
    id: name
    attributes:
      label: Name
      description: Full name of the lab member
      placeholder: "John Doe"
    validations:
      required: true
  
  - type: textarea
    id: avatar
    attributes:
      label: "Profile picture"
      description: |
        Drag-and-drop the member's profile picture here. It will be automatically resized and saved as an asset.
      
      placeholder: "Click here and drag an image to upload, or paste an image URL"
    validations:
      required: false
  
  - type: input
    id: bio
    attributes:
      label: "Bio"
      description: "A description of the lab member in one sentence (or less than 10 words)."
      placeholder: "Works on Artificial Generic Intelligence"
  
  - type: input
    id: orcid
    attributes:
      label: "ORCID"
      description: "Your ORCID identifier (e.g. 0000-0002-1825-0097). Used to fetch publications via OpenAlex."
      placeholder: "0000-0002-1825-0097"
    validations:
      required: false

  - type: input
    id: openalex_id
    attributes:
      label: "OpenAlex ID (Optional)"
      description: "Your [OpenAlex](https://openalex.org) author ID or URL (e.g. A5023888391 or https://openalex.org/A5023888391)."
      placeholder: "A5023888391"
    validations:
      required: false

  - type: dropdown
    id: current_role-type
    attributes:
      label: "Current Role Type"
      description: What's the current role of this person? (set to Unaffilated for Alumni)
      multiple: false
      options:
        - "Faculty / Professor"
        - "Staff"
        - "Postdoc"
        - "Student"
        - "Collaborator"
        - "Unaffiliated"
    validations:
      required: false
  
  - type: input
    id: current_role-title
    attributes:
      label: "Current Role Title"
      description: For students, please choose between "PhD", "Master", "Undergraduate", "Intern".
      placeholder: "PhD"
    validations:
      required: false

  - type: input
    id: current_role-advisor
    attributes:
      label: "Current Role Advisor"
      description: "For students, who is/are the advisor(s)? Separate multiple names with a comma."
      placeholder: "John Doe Sr., Jane Doe"
    validations:
      required: false

  - type: "input"
    id: current_role-affiliation
    attributes:
      label: "Current Role Affiliation"
      description: "Affiliation"
      placeholder: "McGill, Université de Montréal"
    validations:
      required: false

  - type: "input"
    id: scholar
    attributes:
      label: "Scholar"
      description: "Full URL of the lab member's Google Scholar profile"
      placeholder: "https://scholar.google.com/citations?user=<user_id>"
    validations:
      required: false

  - type: "input"
    id: linkedin
    attributes:
      label: "LinkedIn"
      description: "Full URL of the lab member's LinkedIn profile"
      placeholder: "https://www.linkedin.com/in/john-doe"
    validations:
      required: false
  
  - type: "input"
    id: website
    attributes:
      label: "Website"
      description: "Full URL of the lab member's website"
      placeholder: "https://john-doe.github.io/"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        With the limits of GitHub Issues, you can only add / update one past role at a time.
  
  - type: dropdown
    id: past_role-type
    attributes:
      label: "Past Role Type"
      description: What's the past role of this person?
      multiple: false
      options:
        - "Faculty / Professor"
        - "Staff"
        - "Postdoc"
        - "Student"
        - "Collaborator"
    validations:
      required: false
  
  - type: input
    id: past_role-title
    attributes:
      label: "Past Role Title"
      description: What's the past title of this person? For students, please choose between ["PhD, "Master", "Undergraduate", "Intern"]
      placeholder: "PhD"
    validations:
      required: false

  - type: "input"
    id: past_role-affiliation
    attributes:
      label: "Past Role Affiliation"
      description: "Affiliation"
      placeholder: "Mila, McGill1"
    validations:
      required: false
  
  - type: "dropdown"
    id: past_role-research-directions
    attributes:
      label: "Past Role Research Directions"
      description: "What research direction are you in"
      multiple: true
      options:
        - "online-toxicity"
        - "poli-sci"
        - "online-crime"
        - "temporal-graph-learning"
    validations:
      required: false

  - type: input
    id: past_role-advisor
    attributes:
      label: "Advisor"
      description: "For students, who was/were the advisor(s)? Separate multiple names with a comma."
      placeholder: "John Doe Sr., Jane Doe"
    validations:
      required: false
