name: Add news update -- Ajouter une nouvelle

description: |
  Centre announcements and other news updates -- Nouvelles du Centre.
title: "[News update]"
labels: ["automatic-add-news-update"]

body:
  - type: markdown
    attributes:
      value: |
        Use this form for announcements to appear on the 'News' page / Utilisez ce formulaire pour les annonces à afficher sur la page 'Actualités'.

  - type: input
    id: title
    attributes:
      label: Title 
      description: Headline / Title (EN)
      placeholder: "CSDC receives new partnership grant"
    validations:
      required: true

  - type: input
    id: title_fr
    attributes:
      label: Titre
      description: Titre (FR)
      placeholder: "Le CÉCD obtient une nouvelle subvention de partenariat"
    validations:
      required: false

  - type: input
    id: date
    attributes:
      label: Date
      description: Must be in YYYY-MM-DD format
      placeholder: "2026-04-11"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short update text shown in the news card
      placeholder: "Lorem ipsum dolor sit amet, consectetur adipiscing elit."
    validations:
      required: true

  - type: textarea
    id: summary_fr
    attributes:
      label: Summary French
      description: French summary shown on /fr/news/
      placeholder: "Breve mise a jour affichee sur la page des actualites."
    validations:
      required: false

  - type: input
    id: external_link
    attributes:
      label: External link (optional)
      description: URL for more details
      placeholder: "https://example.com/announcement"
    validations:
      required: false
