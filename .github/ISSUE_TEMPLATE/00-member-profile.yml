name: Member profile (add/update) -- Profil de membre (ajouter/mettre à jour)
description: |
  Add or update a member profile / Ajouter ou mettre à jour un profil de membre.
title: "[Member profile]"
labels: ["automatic-member-profile"]
assignees:
  - octocat
body:
  - type: input
    id: name
    attributes:
      label: Name / Nom
      description: Full name of the member / Nom complet du membre.
      placeholder: John Doe
    validations:
      required: true

  - type: dropdown
    id: alumni
    attributes:
      label: Status / Statut
      description: Are you a current member or alumnus? / Êtes-vous membre actuel ou ancien?
      multiple: false
      options:
        - Current Member / Membre actuel
        - Alumni / Ancien membre
    validations:
      required: false

  - type: input
    id: current_role-start_date
    attributes:
      label: Start Date / Date de début
      description: When did you join the center? (Month YYYY) / Quand avez-vous rejoint le centre? (Mois AAAA)
      placeholder: Fall 2024 
    validations:
      required: false

  - type: input
    id: current_role-end_date
    attributes:
      label: End Date (Alumni only) / Date de fin (anciens membres seulement)
      description: When did you leave? Leave blank for current members. / Quand avez-vous quitté? Laisser vide pour les membres actuels.
      placeholder: Spring 2026
    validations:
      required: false

  - type: textarea
    id: avatar
    attributes:
      label: Profile picture / Photo de profil
      description: |
        Drag-and-drop profile picture here, or paste an image URL. / Glissez-déposez la photo de profil ici, ou collez une URL d'image.
      placeholder: Click here and drag an image to upload, or paste an image URL
    validations:
      required: false

  - type: textarea
    id: bio
    attributes:
      label: Bio (EN)
      description: A short description (1 paragraph) of the member.
      placeholder: Works on ...
    validations:
      required: false

  - type: textarea
    id: bio_fr
    attributes:
      label: Bio (FR)
      description: Version francaise du bio.
      placeholder: Travaille sur ...
    validations:
      required: false

  - type: dropdown
    id: current_role-type
    attributes:
      label: Current Role / Rôle actuel
      description: Current role type / Type de rôle actuel
      multiple: false
      options:
        - Faculty or Professor / Faculté ou Professeur
        - Staff / Personnel
        - Postdoc / Postdoctorant
        - Student / Étudiant
        - Collaborator / Collaborateur
        - Unaffiliated / Non affilié
    validations:
      required: false

  - type: input
    id: current_role-title
    attributes:
      label: Current Role Title 
      description: Role title (e.g., Master's or PhD) / Titre du rôle (par exemple, Maitrise ou Doctorat).
      placeholder: Professor / Professeur
    validations:
      required: false

  - type: input
    id: current_role-affiliation
    attributes:
      label: Current Affiliation / Affiliation actuelle
      description: Affiliation
      placeholder: McGill, Universite de Montreal
    validations:
      required: false

  - type: input
    id: current_role-advisor
    attributes:
      label: Current Role Advisor / Superviseur(e) actuel(le)
      description: For students, advisor(s). Separate multiple names with commas. / Pour les étudiants, superviseur(s). Séparez plusieurs noms par des virgules.
      placeholder: John Doe Sr., Jane Doe
    validations:
      required: false

  - type: input
    id: orcid
    attributes:
      label: ORCID
      description: ORCID identifier (e.g. 0000-0002-1825-0097).
      placeholder: 0000-0002-1825-0097
    validations:
      required: false

  - type: input
    id: openalex_id
    attributes:
      label: OpenAlex ID (Optional)
      description: OpenAlex author ID (e.g. A1234567890).
      placeholder: A1234567890
    validations:
      required: false

  - type: input
    id: website
    attributes:
      label: Website / Site personnel.
      description: Personal or lab website URL.
      placeholder: https://example.com
    validations:
      required: false

  - type: input
    id: scholar
    attributes:
      label: Google Scholar
      description: Scholar profile URL.
      placeholder: https://scholar.google.com/citations?user=...
    validations:
      required: false

  - type: input
    id: linkedin
    attributes:
      label: LinkedIn
      description: LinkedIn profile URL.
      placeholder: https://www.linkedin.com/in/username
    validations:
      required: false