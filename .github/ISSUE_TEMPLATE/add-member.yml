name: Add member profile
description: |
  Add new member profile.
title: "[Add member]"
labels: ["automatic-add-member"]
assignees:
  - octocat
body:
  - type: markdown
    attributes:
      value: |
        Please fill out as many fields as possible. This form will automatically generate a PR that will be reviewed by the maintainers.
  
  - type: input
    id: name
    attributes:
      label: Name
      description: Full name of the lab member
      placeholder: "John Doe"
    validations:
      required: true
  
  - type: textarea
    id: avatar
    attributes:
      label: "Avatar"
      description: |
        Path or URL or image of the avatar of the lab member. If it's a URL, it will be automatically resized and saved to `/assets/images/bio`.
        
        Tip: You can drag and drop an image, or click on the "M" button on the bottom right of the text area.   
        Otherwise, you can use imgur and give the **direct** link (e.g. https://i.imgur.com/{id}.png).
      
      placeholder: "Click here and drag an image to upload, or paste an image URL"
    validations:
      required: false
  
  - type: input
    id: bio
    attributes:
      label: "Bio"
      description: "A short description (1 paragraph) of the member."
      placeholder: "Works on Artificial General Intelligence"
  
  - type: input
    id: orcid
    attributes:
      label: "ORCID"
      description: "Your ORCID identifier (e.g. 0000-0002-1825-0097). Used to fetch publications via OpenAlex."
      placeholder: "0000-0002-1825-0097"
    validations:
      required: false

  - type: input
    id: openalex_id
    attributes:
      label: "OpenAlex ID (Optional)"
      description: "Your [OpenAlex](https://openalex.org) author ID or URL (e.g. A5023888391 or https://openalex.org/A5023888391)."
      placeholder: "A5023888391"
    validations:
      required: false

  - type: dropdown
    id: current_role-type
    attributes:
      label: "Current Role Type"
      description: What's the current role of this person? (set to Unaffilated for Alumni)
      multiple: false
      options:
        - "Faculty / Professor"
        - "Staff"
        - "Postdoc"
        - "Student"
        - "Collaborator"
        - "Unaffiliated"
    validations:
      required: true
  
  - type: input
    id: current_role-title
    attributes:
      label: "Current Role Title"
      description: "Role title (e.g., Professor, Director, Administrator, Postdoc, PhD)."
      placeholder: "Professor"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        **For Students**

  - type: "input"
    id: current_role-affiliation
    attributes:
      label: "Current Role Affiliation"
      description: "Affiliation"
      placeholder: "McGill, Université de Montréal"
    validations:
      required: false

  - type: input
    id: current_role-advisor
    attributes:
      label: "Current Role Advisor"
      description: "For students, who is/are the advisor(s)? Separate multiple names with a comma."
      placeholder: "John Doe Sr., Jane Doe"
    validations:
      required: false

  - type: "input"
    id: github
    attributes:
      label: "GitHub"
      description: "Full URL of the lab member's GitHub profile"
      placeholder: "https://github.com/john-doe"
    validations:
      required: false
  
  - type: "input"
    id: twitter
    attributes:
      label: "Twitter"
      description: "Full URL of the lab member's Twitter profile"
      placeholder: "https://twitter.com/john-doe"
    validations:
      required: false
    
  - type: "input"
    id: scholar
    attributes:
      label: "Scholar"
      description: "Full URL of the lab member's Google Scholar profile"
      placeholder: "https://scholar.google.com/citations?user=<user_id>"
    validations:
      required: false

  - type: "input"
    id: linkedin
    attributes:
      label: "LinkedIn"
      description: "Full URL of the lab member's LinkedIn profile"
      placeholder: "https://www.linkedin.com/in/john-doe"
    validations:
      required: false
  
  - type: "input"
    id: website
    attributes:
      label: "Website"
      description: "Full URL of the lab member's website"
      placeholder: "https://john-doe.github.io/"
    validations:
      required: false
